name: Sync upstream

on:
  schedule:
    # Daily at 06:00 UTC (09:00 MSK)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/worldliberty/agentpay-sdk.git
          git fetch upstream
          git checkout main
          if git merge-base --is-ancestor HEAD upstream/main; then
            echo "Fast-forwarding main to upstream/main"
            git merge --ff-only upstream/main
          else
            echo "Histories diverged — attempting merge"
            git merge upstream/main --no-edit || {
              echo "Merge conflict — manual intervention required"
              exit 1
            }
          fi
          git push origin main
